<style>
/* ============================================================
   测试页：Portfolio 名称墙 · 5/行 · 描述全文不截 + 名称顺势上移
   基线已锁（恒定，本轮不动）:
     · 默认态 = 居中衬线透明磨砂「名称墙」（名称居中、衬线 28px、卡片透明磨砂透出全页视频；无图/无 logo/无描述）。
     · hover = 项目图淡入 + 底部满宽磨砂带升起（原 pcard__plate）+ 中字描述居中于带高。
     · 5/行，卡片 1/1，永不出现 logo。
   本轮解决两件事（均已批准）:
     ① 描述全文显示，绝不截断 —— 去掉 line-clamp / max-height 截断；磨砂带高度由内容驱动
        （min-height≈40% 给短描述呼吸感的居中留白，长描述则向上自然生长，全文都进带内、垂直居中）。
     ② hover 时名称「顺势上移」到磨砂带顶边之上 —— 名称与磨砂带是分离两区：
        名称 hover 落在上部固定锚点（垂直居中于卡片顶部区域），高过最高的磨砂带，绝不被带顶边切。
   全 16 家公司一次性铺在一个 5 列网格里（最长描述作为真实压力测试）。
   ============================================================ */

/* 全页背景视频（真实语境：让透明磨砂名称墙透出视频） */
.pagevid{ position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; opacity:.40; pointer-events:none; }

body{ background:var(--c-bg); }
.wrap{ position:relative; z-index:1; max-width:var(--maxw); margin:0 auto; padding:0 var(--page-x) 120px; }

/* 顶部页头 */
.testhead{ position:relative; z-index:1; max-width:var(--maxw); margin:0 auto; padding:120px var(--page-x) 8px; }
.testhead h1{ font-family:var(--ff-serif); font-weight:600; font-size:38px; line-height:1.2; letter-spacing:-0.6px; color:var(--c-ink); }
.testhead p{ margin-top:14px; max-width:880px; font-family:var(--ff-sc); font-size:16px; line-height:27px; color:var(--c-slate); }
.testhead .hint{ margin-top:10px; font-family:var(--ff-mono); font-size:12px; letter-spacing:.04em; color:var(--c-muted); }

/* ===== 名称墙网格（5/行）+ 锁定基线 ===== */
.rgrid{ display:grid; gap:24px; grid-template-columns:repeat(5,1fr); margin-top:40px; }
.rgrid .pcard{ cursor:default;
  /* 锁定：透明磨砂底（透出视频） */
  background:rgba(var(--c-bg-rgb),.30); border:1px solid rgba(var(--c-bg-rgb),.55);
  -webkit-backdrop-filter:blur(16px) saturate(1.1); backdrop-filter:blur(16px) saturate(1.1); }
/* 默认态：背景图隐藏，hover 才淡入（恒定揭示行为） */
.rgrid .pcard__bg{ opacity:0; transition:opacity .7s var(--ease), transform 1.1s var(--ease); }
.rgrid .pcard:hover .pcard__bg{ opacity:1; }
/* 第二枚药丸「已上市」叠在年份 badge 下方 */
.rgrid .pcard__badge--ipo{ top:46px; background:var(--c-accent); border-color:var(--c-accent); color:var(--c-bg); }

/* ① 名称区：默认绝对居中（名称墙）；hover「顺势上移」到顶部锚点（top:50% → top:17%），
   始终 translateY(-50%) 自我垂直居中，靠动画 top 平滑上移，高过最高磨砂带顶边。 */
.rgrid .pcard__name{ position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  z-index:3; display:flex; align-items:center; justify-content:center;
  text-align:center; padding:0 20px; pointer-events:none;
  transition:top .62s var(--ease-soft); }
.rgrid .pcard:hover .pcard__name{ top:17%; }
.rgrid .pcard__name .t{ font-family:var(--ff-serif); font-weight:600; font-size:28px; line-height:1.25; letter-spacing:-0.4px;
  color:var(--c-ink); text-shadow:0 0 14px rgba(var(--c-bg-rgb),.85), 0 1px 3px rgba(var(--c-bg-rgb),.7); transition:text-shadow .5s var(--ease); }
.rgrid .pcard:hover .pcard__name .t{ text-shadow:0 0 16px rgba(var(--c-bg-rgb),.92), 0 1px 6px rgba(var(--c-bg-rgb),.8); }

/* ② 磨砂带（foot 本身就是带）：底部满宽，内容驱动高度。
   min-height 40% → 短描述居中留白；max-height 66% → 顶边封顶在 ~34%，永不触及名称区（名称底约 24%）；
   长描述（≤4 行）天然 < 66% 不会被截。描述在带内垂直居中。 */
.rgrid .pcard__foot{ position:absolute; left:0; right:0; bottom:0; top:auto; z-index:2;
  min-height:40%; max-height:66%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:22px 22px 24px; text-align:center;
  background:linear-gradient(180deg, rgba(var(--c-bg-rgb),.04) 0%, rgba(var(--c-bg-rgb),.46) 26%, rgba(var(--c-bg-rgb),.78) 60%, rgba(var(--c-bg-rgb),.97) 100%);
  -webkit-backdrop-filter:blur(7px); backdrop-filter:blur(7px);
  clip-path:inset(100% 0 0 0); transition:clip-path .64s var(--ease-soft); }
.rgrid .pcard:hover .pcard__foot{ clip-path:inset(0 0 0 0); }
/* 带顶的双发丝高光线（沿用原 plate::before/::after） */
.rgrid .pcard__foot::before{ content:""; position:absolute; left:22px; right:22px; top:0; height:1.5px; border-radius:2px;
  background:linear-gradient(90deg, rgba(var(--c-accent-rgb),0), rgba(var(--c-accent-rgb),.5) 20%, rgba(var(--c-accent-rgb),.5) 80%, rgba(var(--c-accent-rgb),0)); }
.rgrid .pcard__foot::after{ content:""; position:absolute; left:22px; right:22px; top:1.5px; height:1px;
  background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.65) 30%, rgba(255,255,255,.65) 70%, rgba(255,255,255,0)); }

/* 描述：中字 14.5/22，全文不截（无 line-clamp / 无 max-height），hover 淡入。
   关键：覆盖 components.css 里 .pcard__foot .d 的 display:grid + grid-template-rows:0fr（旧收起机制，
   会把描述压成 0 高、磨砂带永远长不起来）→ 改回普通 block 文档流，让带按内容生长；揭示只用 opacity。 */
.rgrid .pcard__foot .d{ display:block; grid-template-rows:none; font-size:14.5px; line-height:22px;
  color:var(--c-slate); text-align:center;
  text-shadow:0 0 12px rgba(var(--c-bg-rgb),.9), 0 1px 4px rgba(var(--c-bg-rgb),.75);
  opacity:0; transform:translateY(6px);
  transition:opacity .45s var(--ease) .12s, transform .55s var(--ease-soft) .12s; }
.rgrid .pcard:hover .pcard__foot .d{ grid-template-rows:none; opacity:1; transform:none; }
.rgrid .pcard__foot .d > .d-inner{ display:block; overflow:visible; min-height:0; max-width:94%; margin:0 auto; }

/* 窄屏兜底 */
@media (max-width:1100px){ .rgrid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width:760px){ .rgrid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:480px){ .rgrid{ grid-template-columns:1fr; } }
</style>
