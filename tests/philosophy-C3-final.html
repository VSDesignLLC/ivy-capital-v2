<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>投资哲学 · C3 终版（混合图 + hover 逐行揭示）</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/css/tokens.css" />
<link rel="stylesheet" href="../assets/css/base.css" />
<link rel="stylesheet" href="../assets/css/components.css" />
<style>
  body{ padding:80px; }
  .variant-tag{ font-family:var(--ff-mono); font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--c-muted); margin-bottom:64px; }
  .phil{ max-width:1100px; margin:0 auto; border-top:1px solid var(--c-hairline); }

  .phil-row{ position:relative; overflow:hidden; border-bottom:1px solid var(--c-hairline); isolation:isolate; }

  /* per-row image beneath + navy scrim on top; hidden until hover */
  .phil-row::before{
    content:""; position:absolute; inset:0; z-index:-1;
    background: var(--scrim), var(--img);
    background-size: cover, cover; background-position:center, center;
    background-blend-mode: var(--blend, normal);
    opacity:0; transition: opacity .6s var(--ease);
  }
  /* accent hairline drawing in along the bottom on hover */
  .phil-row::after{
    content:""; position:absolute; left:0; bottom:0; height:1px; width:100%;
    background:linear-gradient(90deg, var(--c-accent-2), rgba(var(--c-accent-rgb),0));
    transform:scaleX(0); transform-origin:left; opacity:0;
    transition: transform .7s var(--ease-soft), opacity .5s var(--ease);
  }

  .row-inner{ position:relative; display:flex; align-items:flex-start; gap:clamp(48px,14vw,200px); padding:44px 40px; min-height:128px; }
  .row-title{ display:flex; align-items:baseline; gap:20px; flex:none; padding-top:4px; }
  .row-title .cn{ font-family:var(--ff-serif); font-weight:500; font-size:34px; letter-spacing:-0.03em; color:var(--c-ink); transition:color .5s var(--ease); }
  .row-title .en{ font-family:var(--ff-ital); font-style:italic; font-size:30px; color:var(--c-accent); transition:color .5s var(--ease); }

  /* right column: pushed right, line-by-line reveal */
  .row-desc{ margin-left:auto; flex:1 1 auto; max-width:46ch; font-family:var(--ff-sc); font-size:16px; line-height:1.85; color:var(--c-bg); }
  .row-desc .ln{ display:block; opacity:0; transform:translateY(14px); transition:opacity .5s var(--ease), transform .6s var(--ease-soft); }

  .row-idx{ flex:none; padding-top:8px; font-family:var(--ff-mono); font-size:11px; letter-spacing:.18em; color:var(--c-muted); transition:color .5s var(--ease); }

  /* ---- per-row image presets (navy scrim tuned to keep white text legible) ---- */
  .bg-glass{
    --img:url("../assets/philosophy-integrity.jpg");
    --scrim:linear-gradient(105deg, rgba(13,27,42,.90) 0%, rgba(16,36,61,.70) 46%, rgba(10,23,38,.88) 100%);
  }
  .bg-ribbon{
    --img:url("../assets/philosophy-vision.jpg");
    --scrim:linear-gradient(105deg, rgba(13,27,42,.93) 0%, rgba(16,36,61,.82) 46%, rgba(10,23,38,.92) 100%);
    --blend:multiply;
  }
  .bg-blinds{
    --img:url("../assets/philosophy-yearning.jpg");
    --scrim:linear-gradient(105deg, rgba(13,27,42,.84) 0%, rgba(16,36,61,.58) 46%, rgba(10,23,38,.82) 100%);
  }

  @media (prefers-reduced-motion: no-preference){
    .phil-row:hover::before{ opacity:1; }
    .phil-row:hover::after{ opacity:1; transform:scaleX(1); }
    .phil-row:hover .row-title .cn{ color:var(--c-bg); }
    .phil-row:hover .row-title .en{ color:var(--c-accent-2); }
    .phil-row:hover .row-idx{ color:var(--c-accent-2); }
    .phil-row:hover .row-desc .ln{ opacity:1; transform:translateY(0); }
    .phil-row:hover .row-desc .ln:nth-child(1){ transition-delay:.10s; }
    .phil-row:hover .row-desc .ln:nth-child(2){ transition-delay:.18s; }
    .phil-row:hover .row-desc .ln:nth-child(3){ transition-delay:.26s; }
  }

  /* reduced-motion / no-hover fallback: everything static & visible (dark layer off, slate text) */
  @media (prefers-reduced-motion: reduce){
    .row-desc{ color:var(--c-slate); }
    .row-desc .ln{ opacity:1; transform:none; }
  }

  @media (max-width:760px){
    body{ padding:40px 24px; }
    .row-inner{ flex-wrap:wrap; gap:18px; padding:30px 22px; }
    .row-title .cn{ font-size:26px; } .row-title .en{ font-size:22px; }
    .row-desc{ margin-left:0; max-width:100%; }
    .row-idx{ display:none; }
  }
</style>
<link rel="stylesheet" href="../assets/css/motion.css" />
</head>
<body>
  <div class="variant-tag">C3 终版 — 混合图 · hover 逐行揭示</div>
  <div class="phil">

    <div class="phil-row bg-glass">
      <div class="row-inner">
        <span class="row-idx">01</span>
        <div class="row-title"><span class="cn">原则</span><span class="en">Integrity</span></div>
        <p class="row-desc">
          <span class="ln">我们坚持以诚信与原则行事，</span>
          <span class="ln">真诚对待每一位创业者、投资人与合作伙伴，</span>
          <span class="ln">并建立长期可信赖的关系。</span>
        </p>
      </div>
    </div>

    <div class="phil-row bg-ribbon">
      <div class="row-inner">
        <span class="row-idx">02</span>
        <div class="row-title"><span class="cn">愿景</span><span class="en">Vision</span></div>
        <p class="row-desc">
          <span class="ln">我们以远见投资未来，</span>
          <span class="ln">相信真正改变世界的技术，</span>
          <span class="ln">在最早期往往并不被多数人理解。</span>
        </p>
      </div>
    </div>

    <div class="phil-row bg-blinds">
      <div class="row-inner">
        <span class="row-idx">03</span>
        <div class="row-title"><span class="cn">初心</span><span class="en">Yearning</span></div>
        <p class="row-desc">
          <span class="ln">我们因热爱和好奇而出发，</span>
          <span class="ln">相信人类对未知的探索、对科学的追求，</span>
          <span class="ln">以及创造未来的勇气。</span>
        </p>
      </div>
    </div>

  </div>
</body>
</html>
