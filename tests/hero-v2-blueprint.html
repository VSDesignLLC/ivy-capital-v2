<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<base href="../" />
<title>关于我们 · 常春藤资本 Ivy Capital · Hero V2 蓝图</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/components.css" />
<style>
/* ============================================================ HERO V2 · 蓝图浅色版
   纯米色底 + 工程蓝图竖线网格，超大 serif 左对齐标题，mono kicker / label。
   页面专属前缀 bp- ，不污染共享类。只用 tokens.css 里的变量。 */

.bp-hero{
  position:relative;
  min-height:100vh;
  padding:0 var(--page-x);
  background:var(--c-bg);
  overflow:hidden;
  isolation:isolate;
}

/* ---------- 工程蓝图竖线网格底纹（CSS 绘制，缓慢 draw-in） ---------- */
.bp-grid{
  position:absolute; inset:0; z-index:-2; pointer-events:none;
  /* 网格活动区落在两条 rail (64px) 之内，留出页边 */
  padding:0 var(--rail);
}
.bp-grid__inner{
  position:relative; width:100%; height:100%;
  /* 6 等分 → 5 条内部竖线 + 首尾，用 repeating gradient 画极淡 hairline */
  background-image:repeating-linear-gradient(
    to right,
    var(--c-grid) 0, var(--c-grid) 1px,
    transparent 1px, transparent calc(100% / 6)
  );
  background-position:left top;
  /* draw-in：从顶部高度 0 拉满 */
  transform-origin:top center;
  transform:scaleY(0);
  opacity:0;
  animation:bp-draw 1.6s var(--ease-soft) .15s forwards;
}
/* 顶/底各加一条略强的横向基准线，强化"图纸"感 */
.bp-grid__inner::before,
.bp-grid__inner::after{
  content:""; position:absolute; left:0; right:0; height:1px;
  background:var(--c-hairline);
}
.bp-grid__inner::before{ top:0; }
.bp-grid__inner::after{ bottom:0; }

@keyframes bp-draw{
  0%{ transform:scaleY(0); opacity:0; }
  100%{ transform:scaleY(1); opacity:.55; }
}

/* 极淡的 accent 角标 + 坐标刻度（编辑风细节） */
.bp-tick{
  position:absolute; z-index:-1; pointer-events:none;
  font-family:var(--ff-mono); font-size:10px; letter-spacing:.18em;
  text-transform:uppercase; color:var(--c-muted);
}
.bp-tick.tl{ top:calc(var(--rail) + 18px); left:calc(var(--rail) + 14px); }
.bp-tick.tr{ top:calc(var(--rail) + 18px); right:calc(var(--rail) + 14px); }

/* ---------- 内容块：左对齐偏上 ---------- */
.bp-wrap{
  position:relative;
  max-width:var(--maxw);
  margin:0 auto;
  min-height:100vh;
  display:flex; flex-direction:column;
  /* 偏上：上方留白多于"垂直居中"，落在视觉上 1/3 处 */
  justify-content:flex-start;
  padding-top:30vh;
  padding-bottom:140px;
}

/* label = 呼吸圆点 + 英文 About（复用 homepage hero eyebrow）。
   .dot 本体在 base.css(7px 蓝点)，.caption 在 base.css，dot-halo 关键帧在 components.css；
   呼吸光晕 .dot--live::before 仅 homepage 内联，这里按"浅底蓝色光晕"版复制。 */
.bp-kicker{ display:inline-flex; align-items:center; gap:10px; }
.bp-kicker .caption{ color:var(--c-accent); letter-spacing:.2em; }
.bp-kicker .dot--live{ position:relative; isolation:isolate; }
.bp-kicker .dot--live::before{
  content:""; position:absolute; left:50%; top:50%; z-index:-1;
  width:22px; height:22px; border-radius:50%; pointer-events:none;
  transform:translate(-50%,-50%) scale(.55);
  background:radial-gradient(circle, rgba(var(--c-accent-rgb),.55) 0%, rgba(var(--c-accent-rgb),.38) 36%, rgba(var(--c-accent-rgb),.14) 68%, rgba(var(--c-accent-rgb),0) 100%);
  filter:blur(2px); animation:dot-halo 2.4s var(--ease-io) infinite;
}

/* Hero 主标题 = design system `display` token：Noto Sans SC Bold · 108/112/-0.64 */
.bp-title{
  margin:30px 0 0;
  font-family:var(--ff-sc); font-weight:700;
  font-size:clamp(72px, 8vw, 108px); line-height:1.04;
  letter-spacing:-0.64px; color:var(--c-ink);
  max-width:14em;
}
.bp-title .b{ color:var(--c-accent); }

.bp-desc{
  margin:40px 0 0;
  font-family:var(--ff-sc); font-weight:400;
  font-size:20px; line-height:36px; letter-spacing:-0.2px;
  color:var(--c-slate);
  max-width:34em;
}
.bp-desc .n{ font-family:var(--ff-mono); font-weight:500; color:var(--c-ink); letter-spacing:0; }

/* ---------- 底部居中向下引导竖线 + mono label ---------- */
.bp-guide{
  position:absolute; left:50%; bottom:46px; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:18px;
  z-index:1;
}
.bp-guide__label{
  font-family:var(--ff-mono); font-weight:500; font-size:11px;
  letter-spacing:.42em; text-transform:uppercase; color:var(--c-muted);
  /* "了 解 更 多" 已带空格，这里再压一点 */
}
.bp-guide__line{
  position:relative; width:1px; height:64px; overflow:hidden;
  background:var(--c-hairline);
}
/* 沿线缓慢下行的 accent 光点 */
.bp-guide__line::after{
  content:""; position:absolute; left:0; top:0; width:1px; height:22px;
  background:linear-gradient(to bottom, transparent, var(--c-accent));
  animation:bp-flow 2.4s var(--ease-io) infinite;
}
@keyframes bp-flow{
  0%{ transform:translateY(-26px); opacity:0; }
  30%{ opacity:1; }
  100%{ transform:translateY(64px); opacity:0; }
}

/* ---------- reduced-motion：静止兜底 ---------- */
@media (prefers-reduced-motion:reduce){
  .bp-grid__inner{ animation:none; transform:scaleY(1); opacity:.55; }
  .bp-guide__line::after{ animation:none; opacity:0; }
}

/* ---------- 窄屏安全 ---------- */
@media (max-width:1100px){
  .bp-wrap{ padding-top:24vh; }
  .bp-title{ letter-spacing:-0.8px; }
  .bp-desc{ font-size:18px; line-height:32px; }
  .bp-grid__inner{
    background-image:repeating-linear-gradient(
      to right, var(--c-grid) 0, var(--c-grid) 1px,
      transparent 1px, transparent calc(100% / 3));
  }
}
@media (max-width:680px){
  .bp-grid, .bp-tick.tr{ display:none; }
  .bp-title{ max-width:none; }
}
</style>
<link rel="stylesheet" href="assets/css/motion.css" />
<script src="assets/js/partials.js"></script>
</head>
<body data-nav="about">

<div class="page">

  <!-- FULL-HEIGHT SIDE RAILS（共享） -->
  <div class="rails-top" id="rails" aria-hidden="true">
    <div class="rail l"></div>
    <div class="rail r"></div>
  </div>

  <!-- NAV（共享单一来源） -->
  <site-nav></site-nav>

  <!-- HERO V2 · 蓝图浅色版 -->
  <header class="bp-hero">

    <!-- 工程蓝图竖线网格底纹 -->
    <div class="bp-grid" aria-hidden="true"><div class="bp-grid__inner"></div></div>
    <span class="bp-tick tl" aria-hidden="true">Fig. 01 — 关于</span>
    <span class="bp-tick tr" aria-hidden="true">Est. 2014</span>

    <div class="bp-wrap">
      <span class="bp-kicker" data-reveal><span class="dot dot--live"></span><span class="caption">About</span></span>
      <h1 class="bp-title" data-reveal style="--d:90ms">关于<span class="b">我们</span></h1>
      <p class="bp-desc" data-reveal style="--d:200ms">专注深科技领域的早期投资，秉持全球视野，致力于在全球范围内寻找并投资最优秀的科技企业</p>
    </div>

    <!-- 底部居中向下引导（非锚点，不导航） -->
    <div class="bp-guide" aria-hidden="true">
      <span class="bp-guide__label">了 解 更 多</span>
      <span class="bp-guide__line"></span>
    </div>

  </header>

</div>

<script src="assets/js/site.js"></script>
</body>
</html>
