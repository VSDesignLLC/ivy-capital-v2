<style>
/* ============================================================ TEAM 页专属布局
   复用共享层组件 (sec-band/sec-box · rails · grid)。
   文案严格取自飞书《2026官网内容》Page3 团队（仅 block 57 介绍文字）；
   团队成员资料文档未提供 → 成员卡用占位骨架，不编造姓名/职位。 */

#team{ padding-bottom:var(--gap); }

/* ---------- HERO · V4 中轴版（design system display 标题 + 呼吸点 label + 贯穿中轴引导） ---------- */
.hax{ position:relative; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:200px var(--page-x) 0; overflow:hidden; background:var(--c-bg); }
.hax__bg{ position:absolute; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; }
.hax__fade{ position:absolute; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg, rgba(var(--c-bg-rgb),0) 45%, var(--cream-grad) 78%); }
.hax__halo{ position:absolute; left:50%; top:46%; z-index:0; pointer-events:none; width:min(1100px,86vw); aspect-ratio:1/1; transform:translate(-50%,-50%); background:radial-gradient(circle at center, var(--c-accent-wash) 0%, rgba(var(--c-accent-rgb),.018) 38%, rgba(var(--c-accent-rgb),0) 70%); }
.hax__inner{ position:relative; z-index:2; width:100%; max-width:var(--maxw); display:flex; flex-direction:column; align-items:center; text-align:center; }
/* label = 呼吸圆点 + 英文页名（复用 homepage hero eyebrow；.dot/.caption 在 base.css，dot-halo 在 components.css；浅底蓝光晕） */
.hax__kick{ display:inline-flex; align-items:center; gap:10px; margin-bottom:42px; }
.hax__kick .caption{ color:var(--c-accent); letter-spacing:.2em; }
/* .dot--live 呼吸光晕现由 components.css 单一来源提供（eyebrow markup 已组合 class="dot dot--live"）*/
/* Hero 主标题 = design system `display`：Noto Sans SC Bold · 108/112/-0.64 */
.hax__title{ font-family:var(--ff-sc); font-weight:700; font-size:108px; line-height:1.04; letter-spacing:-0.64px; color:var(--c-ink); }
.hax__title .b{ color:var(--c-accent); }
.hax__title .en{ display:block; margin-top:14px; font-family:var(--ff-ital); font-style:italic; font-weight:400; font-size:34px; line-height:1; letter-spacing:.2px; color:var(--c-muted); }
.hax__desc{ margin-top:38px; max-width:680px; font-family:var(--ff-sc); font-weight:400; font-size:18px; line-height:32px; letter-spacing:-0.2px; color:var(--c-slate); }
.hax__axis{ position:relative; z-index:2; margin-top:60px; flex:1 0 auto; min-height:160px; display:flex; flex-direction:column; align-items:center; width:100%; }
.hax__axis-line{ flex:1 1 auto; width:1px; background:linear-gradient(to bottom, var(--c-accent) 0%, rgba(var(--c-accent-rgb),.45) 40%, var(--c-accent-line) 100%); transform-origin:top; transform:scaleY(1); animation:haxDraw 1.7s var(--ease-soft) .45s both; }
.hax__axis::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--c-accent); flex:none; margin-bottom:-3px; z-index:1; opacity:0; animation:haxDot .6s var(--ease) .4s both; }
@keyframes haxDraw{ from{ transform:scaleY(0); opacity:0; } to{ transform:scaleY(1); opacity:1; } }
@keyframes haxDot{ to{ opacity:1; } }
.hax__more{ display:flex; flex-direction:column; align-items:center; gap:14px; padding:18px 0 40px; background:transparent; border:0; cursor:pointer; -webkit-appearance:none; appearance:none; opacity:0; animation:haxFade .8s var(--ease) 1.4s both; }
.hax__more-cap{ font-family:var(--ff-mono); font-size:11px; font-weight:500; letter-spacing:.5em; text-indent:.5em; text-transform:uppercase; color:var(--c-muted); transition:color .3s var(--ease); }
.hax__more:hover .hax__more-cap{ color:var(--c-accent); }
.hax__more-arr{ width:9px; height:9px; border-right:1.5px solid var(--c-accent); border-bottom:1.5px solid var(--c-accent); transform:rotate(45deg); transition:transform .3s var(--ease); }
.hax__more:hover .hax__more-arr{ transform:rotate(45deg) translate(2px,2px); }
@keyframes haxFade{ to{ opacity:1; } }
.hax__kick, .hax__title, .hax__desc{ opacity:0; transform:translateY(20px); animation:haxRise .9s var(--ease-soft) both; }
.hax__kick{ animation-delay:.12s; } .hax__title{ animation-delay:.26s; } .hax__desc{ animation-delay:.42s; }
@keyframes haxRise{ to{ opacity:1; transform:none; } }
@media (max-width:1100px){
  .hax{ padding-top:150px; }
  .hax__title{ font-size:64px; letter-spacing:-1.2px; }
  .hax__title .en{ font-size:26px; }
  .hax__desc{ font-size:16px; line-height:29px; }
}
@media (prefers-reduced-motion:reduce){
  .hax__kick, .hax__title, .hax__desc, .hax__more{ opacity:1; transform:none; animation:none; }
  .hax__axis-line{ animation:none; transform:none; opacity:1; }
  .hax__axis::before{ animation:none; opacity:1; }
}

/* ---------- 团队成员网格（pcard 磨砂卡 · V1 渐变常驻 + 36% 磨砂高度） ---------- */
.team-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:24px; margin-top:56px; }
/* 沿用 components.css 的 .pcard（图 + plate 磨砂 + hover lift/zoom/reveal）；以下为团队版定制：
   姓名+职位常显 + 底部常驻奶白渐变；磨砂 plate 高度收到 36%（贴合文字，仅 hover 时升起） */
.team-grid .pcard__foot{ gap:4px; padding-top:60px;
  background:linear-gradient(180deg, rgba(var(--c-bg-rgb),0) 0%, rgba(var(--c-bg-rgb),.55) 42%, rgba(var(--c-bg-rgb),.96) 100%); }
.team-grid .pcard:hover .pcard__foot{ gap:6px; }
.team-grid .pcard__foot .t{ color:var(--c-ink); text-shadow:0 0 10px rgba(var(--c-bg-rgb),.7); }
.team-grid .pcard__foot .d{ grid-template-rows:1fr; opacity:1; transform:none; color:var(--c-slate); }
.team-grid .pcard__plate{ height:36%; }
.team-grid .pcard{ cursor:pointer; }

/* ---------- 成员详情弹窗 lightbox（点击卡片打开 · 锁浅色 · 柔和投影 e-soft） ---------- */
.lb{ position:fixed; inset:0; z-index:200; visibility:hidden; opacity:0;
  --scrim:rgba(var(--c-bg-rgb),.84); --rail:rgba(var(--c-ink-rgb),.14); --photo:#d9d6cd;
  transition:opacity .4s var(--ease), visibility .4s var(--ease); }
.lb.is-open{ visibility:visible; opacity:1; }
.lb__scrim{ position:absolute; inset:0; z-index:0; background:var(--scrim);
  backdrop-filter:blur(10px) saturate(.9); -webkit-backdrop-filter:blur(10px) saturate(.9); }
.lb__rail{ position:fixed; z-index:1; background:var(--rail); pointer-events:none; }
.lb__rail.v{ width:1px; top:0; height:100vh; } .lb__rail.h{ height:1px; left:0; width:100vw; }
.lb__rail.l{ left:var(--x1,-99px); } .lb__rail.r{ left:var(--x2,-99px); }
.lb__rail.t{ top:var(--y1,-99px); } .lb__rail.b{ top:var(--y2,-99px); }
.lb__card{ position:absolute; z-index:2; top:50%; left:50%; transform:translate(-50%,-50%);
  display:grid; grid-template-columns:1.15fr 1fr; align-items:stretch;
  width:min(1180px, calc(100vw - 220px)); height:min(840px, 86vh);
  background:var(--c-bg); overflow:hidden;
  box-shadow:0 24px 60px -26px rgba(var(--c-ink-rgb),.28); }
.lb__photo{ min-width:0; min-height:0; background:var(--photo); }
.lb__photo img{ width:100%; height:100%; object-fit:cover; display:block; }
.lb__panel{ position:relative; min-width:0; padding:46px 54px 52px; display:flex; flex-direction:column; }
.lb__label{ font-family:var(--ff-sc); font-weight:500; font-size:16px; color:rgba(var(--c-ink-rgb),.62); }
.lb__body{ margin-top:auto; }
.lb__name{ position:relative; padding-left:18px; font-family:var(--ff-sc); font-weight:700; font-size:34px; line-height:1.1; letter-spacing:-0.5px; color:var(--c-ink); }
.lb__name::before{ content:""; position:absolute; left:0; top:.14em; bottom:.12em; width:3px; background:var(--c-accent); }
.lb__role{ padding-left:18px; margin-top:10px; font-family:var(--ff-sc); font-size:15px; letter-spacing:.04em; color:rgba(var(--c-ink-rgb),.55); }
.lb__bio{ margin-top:30px; max-width:46ch; font-family:var(--ff-sc); font-size:17px; line-height:1.95; color:rgba(var(--c-ink-rgb),.82); }
.lb__cell{ position:fixed; z-index:3; display:grid; place-items:center; background:transparent; border:0; cursor:pointer;
  color:rgba(var(--c-ink-rgb),.5); transition:color .25s, background .25s; }
.lb__cell:hover{ color:var(--c-ink); background:rgba(var(--c-ink-rgb),.07); }
.lb__cell svg{ width:24px; height:24px; }
.lb__cell.close{ left:var(--x2,-99px); top:0; width:calc(100vw - var(--x2,0px)); height:var(--y1,0px); }
.lb__cell.prev{ left:0; top:var(--y1,0px); width:var(--x1,0px); height:calc(var(--y2,0px) - var(--y1,0px)); }
.lb__cell.next{ left:var(--x2,-99px); top:var(--y1,0px); width:calc(100vw - var(--x2,0px)); height:calc(var(--y2,0px) - var(--y1,0px)); }
@media (max-width:760px){
  .lb__card{ grid-template-columns:1fr; grid-template-rows:42% 1fr; width:calc(100vw - 28px); height:90vh; }
  .lb__panel{ padding:26px 22px 30px; }
  .lb__name{ font-size:26px; } .lb__bio{ margin-top:18px; font-size:15px; line-height:1.8; }
}

/* ---------- narrow safety ---------- */
@media (max-width:1100px){
  .team-grid{ grid-template-columns:repeat(2,1fr); }
}
@media (max-width:640px){
  .team-grid{ grid-template-columns:1fr; }
}
</style>

<script>
  // 「了解更多」滚动引导：不用锚点（避免 fragment 问题），向下滚一屏。
  (function(){
    document.querySelectorAll('.hax__more').forEach(function(btn){
      btn.addEventListener('click', function(){
        var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
        window.scrollBy({ top: window.innerHeight, behavior: reduce ? 'auto' : 'smooth' });
      });
    });
  })();

  // 团队成员弹窗：点击卡片打开，prev/next 在成员间循环，close / ESC / 点遮罩关闭。
  (function(){
    var lb = document.getElementById('lb'); if(!lb) return;
    var card = document.getElementById('lbCard'),
        photo = document.getElementById('lbPhoto'),
        nameEl = document.getElementById('lbName'),
        roleEl = document.getElementById('lbRole'),
        bioEl  = document.getElementById('lbBio');
    var cards = [].slice.call(document.querySelectorAll('.team-grid .pcard'));
    if(!cards.length) return;
    var members = cards.map(function(c){
      var t = c.querySelector('.pcard__foot .t'),
          d = c.querySelector('.pcard__foot .d-inner'),
          bg = c.querySelector('.pcard__bg');
      return {
        name: t ? t.textContent : '',
        role: d ? d.textContent : '',
        photo: bg ? bg.getAttribute('src') : '',
        bio: c.getAttribute('data-bio') || ''
      };
    });
    var idx = 0;
    function layout(){ var r = card.getBoundingClientRect();
      lb.style.setProperty('--x1', r.left + 'px'); lb.style.setProperty('--x2', r.right + 'px');
      lb.style.setProperty('--y1', r.top + 'px');  lb.style.setProperty('--y2', r.bottom + 'px'); }
    function fill(i){ var m = members[i]; if(!m) return;
      photo.src = m.photo; photo.alt = m.name;
      nameEl.textContent = m.name; roleEl.textContent = m.role; bioEl.textContent = m.bio; }
    function open(i){ idx = i; fill(i); lb.classList.add('is-open'); lb.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
      requestAnimationFrame(function(){ requestAnimationFrame(layout); }); }
    function close(){ lb.classList.remove('is-open'); lb.setAttribute('aria-hidden','true');
      document.body.style.overflow = ''; }
    function go(step){ idx = (idx + step + members.length) % members.length; fill(idx); }
    cards.forEach(function(c, i){ c.addEventListener('click', function(){ open(i); }); });
    document.getElementById('lbClose').addEventListener('click', close);
    document.getElementById('lbScrim').addEventListener('click', close);
    document.getElementById('lbPrev').addEventListener('click', function(){ go(-1); });
    document.getElementById('lbNext').addEventListener('click', function(){ go(1); });
    document.addEventListener('keydown', function(e){
      if(!lb.classList.contains('is-open')) return;
      if(e.key === 'Escape') close();
      else if(e.key === 'ArrowLeft') go(-1);
      else if(e.key === 'ArrowRight') go(1);
    });
    window.addEventListener('resize', function(){ if(lb.classList.contains('is-open')) layout(); }, {passive:true});
  })();
</script>
